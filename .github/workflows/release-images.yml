name: Release Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a publicar (ej: v0.1.0) - opcional en dispatch"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_name: barbersuite-backend
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: barbersuite-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release variables
        id: vars
        shell: bash
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"

          manual_tag="${{ github.event.inputs.tag }}"
          if [[ -n "${manual_tag}" && ! "${manual_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Manual tag must match vX.Y.Z"
            exit 1
          fi

          if [[ -n "${manual_tag}" ]]; then
            echo "manual_tag=${manual_tag}" >> "${GITHUB_OUTPUT}"
            echo "has_manual_tag=true" >> "${GITHUB_OUTPUT}"
          else
            echo "manual_tag=" >> "${GITHUB_OUTPUT}"
            echo "has_manual_tag=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=${{ steps.vars.outputs.manual_tag }},enable=${{ steps.vars.outputs.has_manual_tag }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
