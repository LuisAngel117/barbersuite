spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:barbersuite}}
    username: ${DB_USERNAME:${POSTGRES_USER:barbersuite}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:change-me-local}}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
security:
  jwt:
    secret: ${JWT_SECRET:change-me-local-barbersuite-jwt-secret-please-override}
    issuer: ${JWT_ISSUER:barbersuite-backend}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT8H}
server:
  port: ${SERVER_PORT:8080}
logging:
  level:
    root: INFO
  structured:
    format:
      console: logstash
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
