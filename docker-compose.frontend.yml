services:
  barbersuite-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: barbersuite-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_BASE_URL: http://barbersuite-backend:8080/api/v1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
