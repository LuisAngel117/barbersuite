openapi: 3.1.0
info:
  title: BarberSuite API
  version: 0.3.0
  description: |
    API SaaS multi-tenant para barberías.
    Contrato fuente: este archivo (docs-as-code).
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
tags:
  - name: Auth
    description: Authentication and token issuance endpoints.
  - name: Tenants
    description: Tenant lifecycle and onboarding endpoints.
  - name: Identity
    description: Authenticated identity and current context endpoints.
  - name: Branches
    description: Tenant-scoped branch administration endpoints.
  - name: Appointments
    description: Scheduling and appointment management.
  - name: Invoices
    description: Billing, receipts, and fiscal documents.
  - name: Reports
    description: Reporting and aggregated metrics.
  - name: Notifications
    description: Outbound communication and delivery channels.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    XBranchId:
      name: X-Branch-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Required for branch-scoped endpoints (see ADR-0004).
    BranchId:
      name: branchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Branch identifier scoped to the authenticated tenant.
  responses:
    ValidationProblem:
      description: Validation error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          example:
            type: about:blank
            title: Bad Request
            status: 400
            detail: One or more fields are invalid.
            instance: https://api.barbersuite.local/api/v1/tenants/signup
            code: VALIDATION_ERROR
            errors:
              - field: branchCode
                message: must match pattern ^[A-Z0-9]{2,10}$
    ConflictProblem:
      description: Business conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          example:
            type: about:blank
            title: Conflict
            status: 409
            detail: A unique value already exists for this tenant.
            instance: https://api.barbersuite.local/api/v1/branches
            code: CONFLICT
    UnauthorizedProblem:
      description: Missing or invalid bearer token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          example:
            type: about:blank
            title: Unauthorized
            status: 401
            detail: Authentication is required to access this resource.
            instance: https://api.barbersuite.local/api/v1/me
            code: UNAUTHORIZED
    ForbiddenProblem:
      description: Authenticated but missing required role
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          example:
            type: about:blank
            title: Forbidden
            status: 403
            detail: The authenticated user does not have the required role.
            instance: https://api.barbersuite.local/api/v1/branches
            code: FORBIDDEN
    NotFoundProblem:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          example:
            type: about:blank
            title: Not Found
            status: 404
            detail: The requested branch does not exist for this tenant.
            instance: https://api.barbersuite.local/api/v1/branches/6b6d8fdb-5e10-4bd9-9d79-e6378b19d0e5
            code: BRANCH_NOT_FOUND
  schemas:
    ProblemDetails:
      type: object
      description: RFC 7807 Problem Details for HTTP APIs
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, minimum: 100, maximum: 599 }
        detail: { type: string }
        instance: { type: string, format: uri }
        code: { type: string, description: "Código estable de error (app-level)." }
        traceId: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
    TenantSignupRequest:
      type: object
      required:
        - tenantName
        - branchName
        - branchCode
        - timeZone
        - adminFullName
        - adminEmail
        - adminPassword
      properties:
        tenantName:
          type: string
          minLength: 2
          example: BarberSuite Quito
        branchName:
          type: string
          minLength: 2
          example: Matriz Norte
        branchCode:
          type: string
          pattern: ^[A-Z0-9]{2,10}$
          example: UIO01
        timeZone:
          type: string
          description: IANA time zone identifier.
          example: America/Guayaquil
        adminFullName:
          type: string
          minLength: 2
          example: Ana Pérez
        adminEmail:
          type: string
          format: email
          example: ana@barbersuite.test
        adminPassword:
          type: string
          minLength: 8
          format: password
          example: Admin123!
    TenantSignupResponse:
      type: object
      required:
        - tenantId
        - branchId
        - userId
        - accessToken
        - tokenType
        - expiresIn
      properties:
        tenantId:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        accessToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
        expiresIn:
          type: integer
          format: int32
          description: Access token lifetime in seconds.
    TenantSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    UserSummary:
      type: object
      required: [id, fullName, email, roles]
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
          example: [ADMIN]
    Branch:
      type: object
      required: [id, name, code, timeZone, active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 2
        code:
          type: string
          pattern: ^[A-Z0-9]{2,10}$
        timeZone:
          type: string
          description: IANA time zone identifier.
          example: America/Guayaquil
        active:
          type: boolean
    MeResponse:
      type: object
      required: [tenant, user, branches]
      properties:
        tenant:
          $ref: "#/components/schemas/TenantSummary"
        user:
          $ref: "#/components/schemas/UserSummary"
        branches:
          type: array
          items:
            $ref: "#/components/schemas/Branch"
    CreateBranchRequest:
      type: object
      required: [name, code, timeZone]
      properties:
        name:
          type: string
          minLength: 2
          example: Sucursal Centro
        code:
          type: string
          pattern: ^[A-Z0-9]{2,10}$
          example: UIO02
        timeZone:
          type: string
          description: IANA time zone identifier.
          example: America/Guayaquil
    UpdateBranchRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 2
          example: Sucursal Centro Renovada
        timeZone:
          type: string
          description: IANA time zone identifier.
          example: America/Guayaquil
        active:
          type: boolean

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health (placeholder)
      security: []
      responses:
        "200":
          description: OK
        "400":
          description: Invalid health check request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Service unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /auth/login:
    post:
      operationId: login
      summary: Global login by email
      tags: [Auth]
      security: []
      description: |
        Public login endpoint resolved globally by email.
        The backend finds the unique user by email, derives `tenantId` from the user record,
        and emits a JWT with `tenantId`, `userId`, and `roles` claims.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Token emitido
          content:
            application/json:
              schema:
                type: object
                required: [accessToken, tokenType, expiresIn]
                properties:
                  accessToken: { type: string }
                  tokenType: { type: string, enum: [Bearer] }
                  expiresIn: { type: integer, description: "Segundos" }
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"

  /tenants/signup:
    post:
      operationId: signupTenant
      tags: [Tenants]
      summary: Tenant signup
      description: |
        Public endpoint to create a tenant, its first branch, and the initial admin user.
        This endpoint is public and does not require `X-Branch-Id`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantSignupRequest"
      responses:
        "201":
          description: Tenant, initial branch, and admin user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSignupResponse"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "409":
          $ref: "#/components/responses/ConflictProblem"

  /me:
    get:
      operationId: getCurrentIdentity
      tags: [Identity]
      summary: Current authenticated identity
      description: |
        Returns the authenticated tenant context, current user profile, and branches visible to the tenant.
        Requires any authenticated role. This endpoint is tenant-scoped and must not require `X-Branch-Id`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated identity resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"

  /branches:
    get:
      operationId: listBranches
      tags: [Branches]
      summary: List branches for the authenticated tenant
      description: |
        Tenant-scoped branch administration endpoint.
        Requires `ADMIN` or `MANAGER`.
        This endpoint must not require `X-Branch-Id`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Branches for the authenticated tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
    post:
      operationId: createBranch
      tags: [Branches]
      summary: Create a branch for the authenticated tenant
      description: |
        Tenant-scoped branch administration endpoint.
        Requires `ADMIN` or `MANAGER`.
        This endpoint must not require `X-Branch-Id`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
      responses:
        "201":
          description: Branch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "409":
          $ref: "#/components/responses/ConflictProblem"

  /branches/{branchId}:
    get:
      operationId: getBranchById
      tags: [Branches]
      summary: Get a branch by id
      description: |
        Tenant-scoped branch administration endpoint.
        Requires `ADMIN` or `MANAGER`.
        This endpoint must not require `X-Branch-Id`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BranchId"
      responses:
        "200":
          description: Branch resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
    patch:
      operationId: updateBranch
      tags: [Branches]
      summary: Update a branch by id
      description: |
        Tenant-scoped branch administration endpoint.
        Requires `ADMIN` or `MANAGER`.
        This endpoint must not require `X-Branch-Id`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BranchId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBranchRequest"
      responses:
        "200":
          description: Branch updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
