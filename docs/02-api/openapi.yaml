          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Barber identifier scoped to the authenticated tenant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutBarberAvailabilityRequest"
      responses:
        "200":
          description: Availability replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityBarber"
        "400":
          $ref: "#/components/responses/BranchScopedBadRequestProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
