      description: |
        Branch-scoped availability endpoint.
        Requires `X-Branch-Id`.
        Only `ADMIN` and `MANAGER` can edit barber availability.
        The request uses replace semantics: `weekly` and `exceptions` replace the entire current set for the selected barber in the selected branch.
