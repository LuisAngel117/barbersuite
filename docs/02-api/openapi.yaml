  /clients:
    get:
      operationId: listClients
      tags: [Clients]
      summary: List clients for the authenticated branch context
      description: |
        Branch-scoped client endpoint.
        Requires `X-Branch-Id`.
        Any authenticated role can list clients, including `RECEPTION` and `BARBER`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XBranchId"
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Free-text search by client name or phone.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          description: Zero-based page number.
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: Page size.
        - name: sort
          in: query
          required: false
          schema:
            type: string
            example: fullName,asc
          description: Sorting expression following the shared `sort` convention.
      responses:
        "200":
          description: Clients visible in the authenticated branch context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientPage"
        "400":
          $ref: "#/components/responses/BranchScopedBadRequestProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
    post:
      operationId: createClient
      tags: [Clients]
      summary: Create a client in the authenticated branch context
      description: |
        Branch-scoped client endpoint.
        Requires `X-Branch-Id`.
        Any authenticated role can create clients, including `RECEPTION` and `BARBER`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XBranchId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/BranchScopedBadRequestProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "409":
          $ref: "#/components/responses/ConflictProblem"

  /clients/{clientId}:
    get:
      operationId: getClientById
      tags: [Clients]
      summary: Get a client by id in the authenticated branch context
      description: |
        Branch-scoped client endpoint.
        Requires `X-Branch-Id`.
        Any authenticated role can view branch clients, including `RECEPTION` and `BARBER`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XBranchId"
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Client identifier scoped to `(tenant, branch)`.
      responses:
        "200":
          description: Client resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/BranchScopedBadRequestProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
    patch:
      operationId: updateClient
      tags: [Clients]
      summary: Update a client by id in the authenticated branch context
      description: |
        Branch-scoped client endpoint.
        Requires `X-Branch-Id`.
        `ADMIN`, `MANAGER`, and `RECEPTION` can patch clients. `BARBER` must receive `403 FORBIDDEN`.
        If the payload changes `active`, only `ADMIN` or `MANAGER` should be allowed to deactivate or reactivate the client.
        Empty patches must return `400 VALIDATION_ERROR`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XBranchId"
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Client identifier scoped to `(tenant, branch)`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchClientRequest"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/BranchScopedBadRequestProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
        "409":
          $ref: "#/components/responses/ConflictProblem"

  /barbers:
