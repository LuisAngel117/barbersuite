        Branch-scoped reports endpoint.
        Requires `X-Branch-Id`.
        Only `ADMIN` and `MANAGER` can access reports.
        `from` and `to` are required and interpreted as branch-local dates using the branch IANA time zone.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XBranchId"
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Inclusive branch-local start day.
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Inclusive branch-local end day.
      responses:
        "200":
          description: Barber appointment totals for the selected branch and range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarbersSummary"
        "400":
          $ref: "#/components/responses/BranchScopedBadRequestProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/BranchForbiddenProblem"

  /notifications/email/test:
    post:
      operationId: enqueueTestEmail
      tags: [Notifications]
      summary: Enqueue a test email for SMTP verification
      description: |
        Tenant-scoped notifications endpoint.
        Does not require `X-Branch-Id`.
        Only `ADMIN` and `MANAGER` can enqueue test emails.
        The request must provide at least one of `bodyText` or `bodyHtml`.
        The backend persists the email intent in the outbox and responds `202 Accepted`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTestEmailRequest"
      responses:
        "202":
          description: Email intent persisted in outbox with pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTestEmailResponse"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"

  /notifications/email/outbox:
    get:
      operationId: listEmailOutbox
      tags: [Notifications]
      summary: List email outbox items for the authenticated tenant
      description: |
        Tenant-scoped notifications endpoint.
        Does not require `X-Branch-Id`.
        Only `ADMIN` and `MANAGER` can inspect the email outbox.
        `from` and `to` filter by `createdAt` date.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EmailOutboxStatus"
          description: Filter by outbox delivery status.
        - name: kind
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EmailKind"
          description: Filter by notification kind.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive start day for `createdAt`.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive end day for `createdAt`.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          description: Zero-based page number.
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: Page size.
        - name: sort
          in: query
          required: false
          schema:
            type: string
            example: createdAt,desc
          description: Sorting expression following the shared `sort` convention.
      responses:
        "200":
          description: Email outbox items visible in the authenticated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailOutboxPage"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
